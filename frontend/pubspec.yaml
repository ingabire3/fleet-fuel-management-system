name: npd_fuel_monitor
description: "NPD Fuel Monitor - AI-powered fuel monitoring and GPS tracking for NPD Ltd Rwanda."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0
  http: ^1.2.0
  shared_preferences: ^2.2.0
  supabase_flutter: ^2.5.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  fl_chart: ^0.68.0
  provider: ^6.1.2
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  badges: ^3.1.2
  pdf: ^3.11.3
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/google_fonts/
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"
